<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SophiaShop</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #F7F5F2;
  --white: #FFFFFF;
  --black: #111111;
  --accent: #FF3B3B;
  --muted: #999;
  --border: #E8E4DF;
  --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
}

body {
  background: var(--bg);
  color: var(--black);
  font-family: -apple-system, 'SF Pro Display', 'Segoe UI', sans-serif;
  min-height: 100vh;
  padding-bottom: 90px;
}

/* HEADER */
.header {
  position: sticky; top: 0; z-index: 100;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo { font-size: 18px; font-weight: 900; letter-spacing: -0.5px; }
.logo span { color: var(--accent); }
.cart-btn {
  display: flex; align-items: center; gap: 6px;
  background: var(--black); color: white;
  border: none; padding: 9px 16px;
  border-radius: 22px; cursor: pointer;
  font-size: 13px; font-weight: 600;
}
.cart-badge {
  background: var(--accent); color: white;
  font-size: 10px; font-weight: 800;
  padding: 2px 6px; border-radius: 10px;
  display: none;
}
.cart-badge.show { display: inline-block; }

/* HERO BANNER */
.hero {
  background: var(--black);
  color: white;
  padding: 20px 16px;
  margin: 12px;
  border-radius: 20px;
  display: flex; justify-content: space-between; align-items: center;
}
.hero-text h2 { font-size: 22px; font-weight: 900; line-height: 1.2; }
.hero-text h2 em { color: var(--accent); font-style: normal; }
.hero-text p { font-size: 12px; color: #aaa; margin-top: 6px; }
.hero-badge {
  background: var(--accent);
  padding: 10px 14px;
  border-radius: 14px;
  text-align: center;
  font-weight: 900;
  font-size: 11px;
  line-height: 1.3;
  white-space: nowrap;
}

/* FILTERS */
.section-title {
  padding: 0 16px 10px;
  font-size: 13px; font-weight: 700;
  color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px;
}
.filters {
  display: flex; gap: 8px;
  padding: 0 16px 14px;
  overflow-x: auto; scrollbar-width: none;
}
.filters::-webkit-scrollbar { display: none; }
.filter-btn {
  white-space: nowrap; padding: 8px 16px;
  border-radius: 20px; border: 1.5px solid var(--border);
  background: var(--white); color: var(--black);
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: all 0.15s;
}
.filter-btn.active {
  background: var(--black); color: white; border-color: var(--black);
}

/* GRID */
.grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; padding: 0 12px;
}
.card {
  background: var(--white); border-radius: 16px;
  overflow: hidden; cursor: pointer;
  box-shadow: var(--card-shadow);
  transition: transform 0.15s;
}
.card:active { transform: scale(0.97); }
.card-img {
  width: 100%; aspect-ratio: 1; object-fit: cover;
  background: #f0ede9;
}
.card-img-placeholder {
  width: 100%; aspect-ratio: 1;
  background: #f0ede9;
  display: flex; align-items: center; justify-content: center;
  font-size: 52px;
}
.card-body { padding: 10px; }
.card-name { font-size: 12px; font-weight: 700; margin-bottom: 4px; line-height: 1.3; }
.card-price { font-size: 14px; font-weight: 900; color: var(--accent); }
.card-sizes { display: flex; gap: 3px; margin-top: 6px; flex-wrap: wrap; }
.sz { font-size: 9px; color: var(--muted); background: var(--bg); padding: 2px 5px; border-radius: 4px; font-weight: 600; }

.empty-state {
  text-align: center; padding: 60px 20px;
  color: var(--muted); grid-column: 1/-1;
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }

/* MODAL */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.5); z-index: 300;
  align-items: flex-end;
}
.overlay.open { display: flex; }
.modal {
  background: var(--white); border-radius: 24px 24px 0 0;
  padding: 0 0 30px;
  width: 100%; max-height: 90vh; overflow-y: auto;
  animation: up 0.28s cubic-bezier(.22,1,.36,1);
}
@keyframes up { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle {
  width: 36px; height: 4px; background: var(--border);
  border-radius: 2px; margin: 12px auto;
}
.modal-img {
  width: 100%; aspect-ratio: 1; object-fit: cover;
  background: #f0ede9;
}
.modal-img-placeholder {
  width: 100%; aspect-ratio: 1; background: #f0ede9;
  display: flex; align-items: center; justify-content: center; font-size: 100px;
}
.modal-body { padding: 16px; }
.modal-name { font-size: 20px; font-weight: 900; margin-bottom: 4px; }
.modal-price { font-size: 26px; font-weight: 900; color: var(--accent); margin-bottom: 20px; }
.label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; }
.sizes-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.size-opt {
  padding: 10px 18px; border-radius: 10px;
  border: 1.5px solid var(--border); background: white;
  font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.15s;
}
.size-opt.active { background: var(--black); color: white; border-color: var(--black); }
.add-btn {
  width: 100%; padding: 16px; background: var(--accent); color: white;
  font-size: 16px; font-weight: 800; border: none; border-radius: 14px;
  cursor: pointer; transition: opacity 0.15s;
}
.add-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.add-btn:not(:disabled):active { opacity: 0.85; }

/* PAGES */
.page { display: none; padding: 16px; }
.page.show { display: block; }

.back { background: none; border: none; color: var(--muted); font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 5px; margin-bottom: 16px; padding: 0; font-weight: 600; }
.page-title { font-size: 22px; font-weight: 900; margin-bottom: 16px; }

/* CART */
.cart-item {
  display: flex; align-items: center; gap: 12px;
  background: var(--white); border-radius: 14px;
  padding: 12px; margin-bottom: 10px;
  box-shadow: var(--card-shadow);
}
.ci-img { width: 56px; height: 56px; border-radius: 10px; object-fit: cover; background: #f0ede9; display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; }
.ci-info { flex: 1; min-width: 0; }
.ci-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ci-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
.ci-price { font-size: 14px; font-weight: 900; color: var(--accent); margin-top: 4px; }
.ci-remove { background: none; border: none; color: #ccc; font-size: 18px; cursor: pointer; padding: 4px; flex-shrink: 0; }

.summary-box {
  background: var(--white); border-radius: 14px;
  padding: 16px; margin: 14px 0;
  box-shadow: var(--card-shadow);
}
.sum-row { display: flex; justify-content: space-between; font-size: 14px; color: var(--muted); margin-bottom: 8px; }
.sum-row.total { font-size: 18px; font-weight: 900; color: var(--black); padding-top: 10px; border-top: 1px solid var(--border); margin-top: 4px; }
.primary-btn {
  width: 100%; padding: 16px; background: var(--black); color: white;
  font-size: 16px; font-weight: 800; border: none; border-radius: 14px; cursor: pointer;
}
.primary-btn:active { opacity: 0.85; }

/* ORDER FORM */
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.field input, .field select {
  width: 100%; padding: 14px; border: 1.5px solid var(--border);
  border-radius: 12px; font-size: 15px; outline: none;
  background: var(--white); color: var(--black);
  transition: border-color 0.15s;
  -webkit-appearance: none;
}
.field input:focus, .field select:focus { border-color: var(--black); }
.pay-row { display: flex; gap: 8px; }
.pay-opt {
  flex: 1; padding: 12px; border: 1.5px solid var(--border);
  border-radius: 12px; background: white; font-size: 14px;
  font-weight: 700; cursor: pointer; text-align: center; transition: all 0.15s;
}
.pay-opt.active { background: var(--black); color: white; border-color: var(--black); }

/* SUCCESS */
.success-wrap { text-align: center; padding: 50px 20px; }
.success-icon { font-size: 72px; margin-bottom: 16px; }
.success-title { font-size: 24px; font-weight: 900; margin-bottom: 8px; }
.success-text { color: var(--muted); font-size: 15px; line-height: 1.6; }

/* TOAST */
.toast {
  position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--black); color: white; padding: 10px 20px;
  border-radius: 20px; font-size: 13px; font-weight: 600;
  opacity: 0; transition: all 0.25s; z-index: 999; white-space: nowrap;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">sophia<span>shop</span></div>
  <button class="cart-btn" onclick="goCart()">
    🛒 Savat <span class="cart-badge" id="badge">0</span>
  </button>
</div>

<!-- CATALOG -->
<div class="page show" id="p-catalog">
  <div class="hero">
    <div class="hero-text">
      <h2>Print<br><em>futbolkalar</em></h2>
      <p>🚀 1-2 kunda yetkazish</p>
    </div>
    <div class="hero-badge">📦<br>Butun<br>O'zbekiston</div>
  </div>

  <div class="section-title">Katalog</div>
  <div class="filters" id="filters">
    <button class="filter-btn active" onclick="filter('all',this)">Barchasi</button>
    <button class="filter-btn" onclick="filter('anime',this)">Anime</button>
    <button class="filter-btn" onclick="filter('sport',this)">Sport</button>
    <button class="filter-btn" onclick="filter('logo',this)">Logo</button>
    <button class="filter-btn" onclick="filter('nature',this)">Tabiat</button>
    <button class="filter-btn" onclick="filter('other',this)">Boshqa</button>
  </div>
  <div class="grid" id="grid"></div>
</div>

<!-- CART -->
<div class="page" id="p-cart">
  <button class="back" onclick="go('p-catalog')">← Orqaga</button>
  <div class="page-title">Savat 🛒</div>
  <div id="cart-list"></div>
</div>

<!-- ORDER -->
<div class="page" id="p-order">
  <button class="back" onclick="go('p-cart')">← Orqaga</button>
  <div class="page-title">Buyurtma berish 📦</div>
  <div class="field"><label>Ismingiz</label><input id="f-name" placeholder="Sardor Rahimov" type="text"></div>
  <div class="field"><label>Telefon</label><input id="f-phone" placeholder="+998 90 000 00 00" type="tel"></div>
  <div class="field"><label>Viloyat / Shahar</label>
    <select id="f-city">
      <option value="">Tanlang...</option>
      <option>Toshkent</option><option>Samarqand</option><option>Buxoro</option>
      <option>Andijon</option><option>Farg'ona</option><option>Namangan</option>
      <option>Qashqadaryo</option><option>Surxondaryo</option><option>Xorazm</option>
      <option>Navoiy</option><option>Jizzax</option><option>Sirdaryo</option>
      <option>Qoraqalpog'iston</option>
    </select>
  </div>
  <div class="field"><label>To'liq manzil</label><input id="f-addr" placeholder="Ko'cha, uy raqami" type="text"></div>
  <div class="field">
    <label>To'lov usuli</label>
    <div class="pay-row">
      <button class="pay-opt active" id="pay-click" onclick="selPay('click')">💳 Click</button>
      <button class="pay-opt" id="pay-payme" onclick="selPay('payme')">💳 Payme</button>
      <button class="pay-opt" id="pay-cash" onclick="selPay('cash')">💵 Naqd</button>
    </div>
  </div>
  <button class="primary-btn" onclick="submitOrder()">Tasdiqlash ✓</button>
</div>

<!-- SUCCESS -->
<div class="page" id="p-success">
  <div class="success-wrap">
    <div class="success-icon">🎉</div>
    <div class="success-title">Buyurtma qabul qilindi!</div>
    <div class="success-text">Tez orada siz bilan bog'lanamiz.<br><br>Yetkazib berish: <strong>1-2 ish kuni 🚀</strong><br>Butun O'zbekiston bo'ylab 📦</div>
    <button class="primary-btn" style="margin-top:32px;" onclick="go('p-catalog')">Xarid davom ettirish</button>
  </div>
</div>

<!-- PRODUCT MODAL -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div id="m-img"></div>
    <div class="modal-body">
      <div class="modal-name" id="m-name"></div>
      <div class="modal-price" id="m-price"></div>
      <div class="label">Razmer tanlang</div>
      <div class="sizes-row" id="m-sizes"></div>
      <button class="add-btn" id="m-btn" onclick="addCart()" disabled>Razmerni tanlang</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const SIZES = ['XS','S','M','L','XL','XXL'];
const DELIVERY = 15000;
const API_BASE = ''; // deploy qilganda to'ldiriladi

// Mahsulotlarni serverdan yuklash
let products = [];
let cart = [];
let curProd = null, curSize = null, curPay = 'click';
let curFilter = 'all';

async function loadProducts() {
  try {
    const res = await fetch(API_BASE + '/api/products');
    products = await res.json();
  } catch {
    // Agar server yo'q bo'lsa demo
    products = [];
  }
  renderGrid(curFilter);
}

function renderGrid(f) {
  const g = document.getElementById('grid');
  const list = f === 'all' ? products : products.filter(p => p.category === f);
  if (!list.length) {
    g.innerHTML = `<div class="empty-state"><div class="icon">🎽</div><p>Mahsulot topilmadi</p></div>`;
    return;
  }
  g.innerHTML = list.map(p => `
    <div class="card" onclick="openModal(${p.id})">
      ${p.image_url
        ? `<img class="card-img" src="${p.image_url}" onerror="this.style.display='none'" loading="lazy">`
        : `<div class="card-img-placeholder">${p.emoji||'👕'}</div>`}
      <div class="card-body">
        <div class="card-name">${p.name}</div>
        <div class="card-price">${Number(p.price).toLocaleString()} so'm</div>
        <div class="card-sizes">${SIZES.map(s=>`<span class="sz">${s}</span>`).join('')}</div>
      </div>
    </div>
  `).join('');
}

function filter(f, btn) {
  curFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid(f);
}

function openModal(id) {
  curProd = products.find(p => p.id === id);
  curSize = null;
  const mi = document.getElementById('m-img');
  mi.innerHTML = curProd.image_url
    ? `<img class="modal-img" src="${curProd.image_url}" onerror="this.parentNode.innerHTML='<div class=modal-img-placeholder>${curProd.emoji||'👕'}</div>'">`
    : `<div class="modal-img-placeholder">${curProd.emoji||'👕'}</div>`;
  document.getElementById('m-name').textContent = curProd.name;
  document.getElementById('m-price').textContent = Number(curProd.price).toLocaleString() + ' so\'m';
  document.getElementById('m-sizes').innerHTML = SIZES.map(s =>
    `<button class="size-opt" onclick="selSize('${s}',this)">${s}</button>`
  ).join('');
  const btn = document.getElementById('m-btn');
  btn.disabled = true;
  btn.textContent = 'Razmerni tanlang';
  document.getElementById('overlay').classList.add('open');
}

function selSize(s, el) {
  curSize = s;
  document.querySelectorAll('.size-opt').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  const btn = document.getElementById('m-btn');
  btn.disabled = false;
  btn.textContent = 'Savatga qo\'shish 🛒';
}

function closeModal(e) {
  if (e.target === document.getElementById('overlay'))
    document.getElementById('overlay').classList.remove('open');
}

function addCart() {
  if (!curSize) return;
  const ex = cart.find(i => i.id === curProd.id && i.size === curSize);
  if (ex) ex.qty++;
  else cart.push({ ...curProd, size: curSize, qty: 1 });
  updateBadge();
  document.getElementById('overlay').classList.remove('open');
  showToast('✅ Savatga qo\'shildi!');
}

function updateBadge() {
  const n = cart.reduce((s,i) => s+i.qty, 0);
  const b = document.getElementById('badge');
  b.textContent = n;
  b.classList.toggle('show', n > 0);
}

function go(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('show'));
  document.getElementById(page).classList.add('show');
  window.scrollTo(0,0);
}

function goCart() {
  renderCart();
  go('p-cart');
}

function renderCart() {
  const el = document.getElementById('cart-list');
  if (!cart.length) {
    el.innerHTML = `<div class="empty-state" style="grid-column:unset"><div class="icon">🛒</div><p>Savat bo'sh</p></div>`;
    return;
  }
  const items = cart.map((item,i) => `
    <div class="cart-item">
      <div class="ci-img">
        ${item.image_url
          ? `<img src="${item.image_url}" style="width:100%;height:100%;object-fit:cover;border-radius:10px;" onerror="this.style.display='none'">`
          : (item.emoji||'👕')}
      </div>
      <div class="ci-info">
        <div class="ci-name">${item.name}</div>
        <div class="ci-sub">Razmer: ${item.size} · ${item.qty} dona</div>
        <div class="ci-price">${(item.price*item.qty).toLocaleString()} so'm</div>
      </div>
      <button class="ci-remove" onclick="removeItem(${i})">✕</button>
    </div>
  `).join('');

  const sub = cart.reduce((s,i) => s+i.price*i.qty, 0);
  const total = sub + DELIVERY;
  el.innerHTML = items + `
    <div class="summary-box">
      <div class="sum-row"><span>Mahsulotlar</span><span>${sub.toLocaleString()} so'm</span></div>
      <div class="sum-row"><span>Yetkazib berish</span><span>${DELIVERY.toLocaleString()} so'm</span></div>
      <div class="sum-row total"><span>Jami</span><span>${total.toLocaleString()} so'm</span></div>
    </div>
    <button class="primary-btn" onclick="go('p-order')">Buyurtma berish →</button>
  `;
}

function removeItem(i) {
  cart.splice(i,1);
  updateBadge();
  renderCart();
}

function selPay(m) {
  curPay = m;
  ['click','payme','cash'].forEach(k => {
    document.getElementById('pay-'+k).classList.toggle('active', k===m);
  });
}

async function submitOrder() {
  const name = document.getElementById('f-name').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const city = document.getElementById('f-city').value;
  const addr = document.getElementById('f-addr').value.trim();
  if (!name||!phone||!city||!addr) { showToast('⚠️ Barcha maydonlarni to\'ldiring!'); return; }

  const order = { name, phone, city, address: addr, pay: curPay, cart,
    total: cart.reduce((s,i)=>s+i.price*i.qty,0)+DELIVERY,
    tg_user: tg?.initDataUnsafe?.user };

  try {
    await fetch(API_BASE+'/api/order', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(order)
    });
  } catch(e) { console.log('offline mode'); }

  cart = []; updateBadge();
  go('p-success');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

loadProducts();
</script>
</body>
</html>
