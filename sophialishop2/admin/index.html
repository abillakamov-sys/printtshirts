<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SophiaShop — Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f5f5f5;--white:#fff;--black:#1a1a2e;
  --accent:#6c63ff;--red:#ff4757;--green:#2ed573;
  --border:#e8e8e8;--muted:#999;--text:#222;
  --shadow:0 2px 12px rgba(0,0,0,.08);
}
body{background:var(--bg);font-family:-apple-system,'Segoe UI',sans-serif;color:var(--text);}
.topbar{background:var(--accent);color:white;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.topbar h1{font-size:18px;font-weight:900;}
.topbar span{font-size:12px;opacity:.8;}

/* AUTH */
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.auth-box{background:white;border-radius:20px;padding:32px;box-shadow:var(--shadow);width:100%;max-width:360px;text-align:center;}
.auth-box h2{font-size:22px;font-weight:900;margin-bottom:8px;}
.auth-box p{color:var(--muted);font-size:14px;margin-bottom:20px;}
.auth-input{width:100%;padding:14px;border:1.5px solid var(--border);border-radius:12px;font-size:16px;margin-bottom:12px;outline:none;}
.auth-input:focus{border-color:var(--accent);}
.auth-btn{width:100%;padding:14px;background:var(--accent);color:white;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;}

/* MAIN */
#main-screen{display:none;}
.tabs{display:flex;border-bottom:1px solid var(--border);background:white;}
.tab{flex:1;padding:13px;text-align:center;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;}
.tab.active{color:var(--accent);border-color:var(--accent);}
.tab-content{display:none;}
.tab-content.active{display:block;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px;}
.stat-card{background:white;border-radius:14px;padding:14px;box-shadow:var(--shadow);text-align:center;}
.stat-num{font-size:24px;font-weight:900;color:var(--accent);}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px;font-weight:600;}

/* SECTION */
.section{padding:0 16px 20px;}
.section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.section-hd h2{font-size:16px;font-weight:800;}
.add-btn{background:var(--accent);color:white;border:none;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;}

/* FORM */
.form-card{background:white;border-radius:16px;padding:20px;box-shadow:var(--shadow);margin-bottom:16px;display:none;}
.form-card.open{display:block;}
.form-card h3{font-size:16px;font-weight:800;margin-bottom:16px;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.field input,.field select,.field textarea{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;outline:none;background:white;font-family:inherit;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);}
.field textarea{resize:vertical;min-height:80px;}

/* COLORS */
.colors-section{margin-bottom:16px;}
.colors-title{font-size:13px;font-weight:800;margin-bottom:10px;color:var(--black);}
.color-item{background:var(--bg);border-radius:12px;padding:14px;margin-bottom:10px;border:1.5px solid var(--border);}
.color-item.active-color{border-color:var(--accent);background:rgba(108,99,255,.04);}
.color-hd{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.color-dot{width:24px;height:24px;border-radius:50%;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,.2);flex-shrink:0;}
.color-name-inp{flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-weight:700;outline:none;}
.color-name-inp:focus{border-color:var(--accent);}
.color-picker{width:40px;height:36px;border:none;border-radius:8px;cursor:pointer;padding:2px;}
.remove-color-btn{background:rgba(255,71,87,.1);border:none;color:var(--red);font-size:18px;cursor:pointer;padding:4px 8px;border-radius:6px;}
.img-preview-wrap{display:flex;align-items:center;gap:10px;}
.img-preview{width:80px;height:80px;border-radius:10px;object-fit:cover;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:32px;border:1.5px dashed var(--border);flex-shrink:0;}
.img-preview img{width:100%;height:100%;object-fit:cover;border-radius:10px;}
.url-inp{flex:1;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;outline:none;}
.url-inp:focus{border-color:var(--accent);}
.add-color-btn{width:100%;padding:10px;background:rgba(108,99,255,.08);color:var(--accent);border:1.5px dashed var(--accent);border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:4px;}
.colors-hint{font-size:11px;color:var(--muted);text-align:center;}

/* FORM ACTIONS */
.form-actions{display:flex;gap:8px;margin-top:16px;}
.save-btn{flex:1;padding:13px;background:var(--accent);color:white;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;}
.cancel-btn{padding:13px 20px;border:1.5px solid var(--border);border-radius:10px;background:white;font-size:15px;font-weight:700;cursor:pointer;}

/* CAT MANAGER */
.cat-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
.cat-tag{display:flex;align-items:center;gap:6px;background:white;border:1.5px solid var(--border);border-radius:20px;padding:6px 12px;font-size:13px;font-weight:600;}
.cat-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;line-height:1;}
.cat-add-row{display:flex;gap:8px;}
.cat-inp{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;outline:none;}
.cat-inp:focus{border-color:var(--accent);}
.cat-add-btn{padding:10px 16px;background:var(--accent);color:white;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;}

/* PRODUCT LIST */
.prod-item{background:white;border-radius:14px;display:flex;align-items:center;gap:12px;padding:12px;margin-bottom:10px;box-shadow:var(--shadow);}
.prod-thumb{width:64px;height:64px;border-radius:10px;object-fit:cover;background:#f0f0f0;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:28px;overflow:hidden;position:relative;}
.prod-thumb img{width:100%;height:100%;object-fit:cover;}
.prod-colors-dots{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);display:flex;gap:2px;}
.pcdot{width:8px;height:8px;border-radius:50%;border:1px solid white;}
.prod-info{flex:1;min-width:0;}
.prod-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prod-meta{font-size:12px;color:var(--muted);margin-top:2px;}
.prod-price{font-size:14px;font-weight:900;color:var(--accent);}
.prod-actions{display:flex;gap:6px;flex-shrink:0;}
.edit-btn,.del-btn{padding:7px 10px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;}
.edit-btn{background:#f0ede9;color:var(--black);}
.del-btn{background:#ffe5e5;color:var(--red);}

/* ORDERS */
.order-item{background:white;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);}
.order-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.order-id{font-size:12px;color:var(--muted);font-weight:600;}
.order-status{font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px;}
.status-new{background:#FEF3C7;color:#D97706;}
.status-done{background:#DCFCE7;color:#16A34A;}
.order-name{font-size:15px;font-weight:800;}
.order-info{font-size:13px;color:var(--muted);margin-top:3px;}
.order-items{font-size:12px;color:#555;margin-top:6px;background:var(--bg);border-radius:8px;padding:8px;}
.order-total{font-size:15px;font-weight:900;color:var(--accent);margin-top:8px;}
.done-btn{width:100%;margin-top:10px;padding:10px;background:var(--green);color:white;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;}

.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty .icon{font-size:40px;margin-bottom:8px;}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--black);color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:all .25s;z-index:999;pointer-events:none;white-space:nowrap;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box">
    <h2>🔐 Admin Panel</h2>
    <p>SophiaShop boshqaruv paneli</p>
    <input class="auth-input" id="pwd" type="password" placeholder="Parol" onkeydown="if(event.key==='Enter')login()">
    <button class="auth-btn" onclick="login()">Kirish</button>
  </div>
</div>

<div id="main-screen">
  <div class="topbar">
    <h1>🎽 SophiaShop Admin</h1>
    <span id="top-info">...</span>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('products')">🎽 Mahsulotlar</div>
    <div class="tab" onclick="switchTab('categories')">🏷 Kategoriyalar</div>
    <div class="tab" onclick="switchTab('orders')">📦 Buyurtmalar</div>
  </div>

  <!-- MAHSULOTLAR -->
  <div class="tab-content active" id="tab-products">
    <div class="stats">
      <div class="stat-card"><div class="stat-num" id="s-prods">0</div><div class="stat-label">Mahsulot</div></div>
      <div class="stat-card"><div class="stat-num" id="s-orders">0</div><div class="stat-label">Buyurtma</div></div>
      <div class="stat-card"><div class="stat-num" id="s-revenue">0</div><div class="stat-label">Daromad (K)</div></div>
    </div>
    <div class="section">
      <div class="section-hd">
        <h2>Mahsulotlar</h2>
        <button class="add-btn" onclick="openForm()">+ Qo'shish</button>
      </div>

      <!-- FORM -->
      <div class="form-card" id="prod-form">
        <h3 id="form-title">Yangi mahsulot</h3>
        <input type="hidden" id="edit-id">

        <div class="field">
          <label>Mahsulot nomi</label>
          <input id="f-name" placeholder="Masalan: Anime Nezuko futbolka">
        </div>
        <div class="field">
          <label>Tavsif</label>
          <textarea id="f-desc" placeholder="100% paxta, yuqori sifatli print..."></textarea>
        </div>
        <div class="field">
          <label>Narx (so'm)</label>
          <input id="f-price" type="number" placeholder="73000">
        </div>
        <div class="field">
          <label>Kategoriya</label>
          <select id="f-cat"></select>
        </div>

        <!-- RANGLAR -->
        <div class="colors-section">
          <div class="colors-title">🎨 Ranglar va rasmlar (4 tagacha)</div>
          <div id="colors-list"></div>
          <button class="add-color-btn" id="add-color-btn" onclick="addColor()">+ Rang qo'shish</button>
          <div class="colors-hint">Har bir rang uchun rasm URL va rang nomini kiriting</div>
        </div>

        <div class="form-actions">
          <button class="save-btn" onclick="saveProduct()">💾 Saqlash</button>
          <button class="cancel-btn" onclick="closeForm()">Bekor</button>
        </div>
      </div>

      <div id="prod-list"></div>
    </div>
  </div>

  <!-- KATEGORIYALAR -->
  <div class="tab-content" id="tab-categories">
    <div class="section" style="padding-top:16px;">
      <div class="section-hd"><h2>Kategoriyalar</h2></div>
      <div class="form-card open" style="display:block">
        <div class="cat-list" id="cat-list"></div>
        <div class="cat-add-row">
          <input class="cat-inp" id="cat-emoji" placeholder="🎌" maxlength="2" style="width:60px;flex:none;">
          <input class="cat-inp" id="cat-name" placeholder="Kategoriya nomi" onkeydown="if(event.key==='Enter')addCategory()">
          <button class="cat-add-btn" onclick="addCategory()">+ Qo'shish</button>
        </div>
      </div>
    </div>
  </div>

  <!-- BUYURTMALAR -->
  <div class="tab-content" id="tab-orders">
    <div class="section" style="padding-top:16px;">
      <div id="orders-list"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const ADMIN_PWD='sophia2024';
const API='';

// Default kategoriyalar
const DEFAULT_CATS=[
  {id:'anime',emoji:'🎌',name:'Anime'},
  {id:'popular',emoji:'🔥',name:'Mashhurlar'},
  {id:'football',emoji:'⚽',name:'Futbol'},
  {id:'nature',emoji:'🌿',name:'Tabiat'},
  {id:'cartoon',emoji:'🎭',name:'Multfilm'},
  {id:'quotes',emoji:'💬',name:'Quotes'},
];

const PRESET_COLORS=[
  {name:'Qora',hex:'#111111'},
  {name:'Oq',hex:'#ffffff'},
  {name:'Ko\'k',hex:'#2d6cdf'},
  {name:'Qizil',hex:'#e63946'},
  {name:'Yashil',hex:'#2dc653'},
  {name:'Kulrang',hex:'#888888'},
];

let products=[],orders=[],categories=[],editingId=null;
let formColors=[]; // [{name, hex, imageUrl}]

// AUTH
function login(){
  if(document.getElementById('pwd').value===ADMIN_PWD){
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('main-screen').style.display='block';
    loadAll();
  }else{
    showToast('❌ Noto\'g\'ri parol!');
    document.getElementById('pwd').value='';
  }
}

// LOAD
async function loadAll(){
  await Promise.all([loadProducts(),loadOrders(),loadCategories()]);
}

async function loadProducts(){
  try{const r=await fetch(API+'/api/products');products=await r.json();}
  catch{products=JSON.parse(localStorage.getItem('ss_products')||'[]');}
  renderProducts();updateStats();
}

async function loadOrders(){
  try{const r=await fetch(API+'/api/orders');orders=await r.json();}
  catch{orders=JSON.parse(localStorage.getItem('ss_orders')||'[]');}
  renderOrders();updateStats();
}

async function loadCategories(){
  try{const r=await fetch(API+'/api/categories');categories=await r.json();}
  catch{
    const saved=localStorage.getItem('ss_cats');
    categories=saved?JSON.parse(saved):DEFAULT_CATS;
  }
  renderCategories();renderCatSelect();
}

function updateStats(){
  document.getElementById('s-prods').textContent=products.length;
  document.getElementById('s-orders').textContent=orders.length;
  const rev=orders.filter(o=>o.done).reduce((s,o)=>s+(o.total||0),0);
  document.getElementById('s-revenue').textContent=rev>0?Math.round(rev/1000)+'K':'0';
  document.getElementById('top-info').textContent=products.length+' mahsulot · '+orders.filter(o=>!o.done).length+' yangi buyurtma';
}

// CATEGORIES
function renderCategories(){
  const el=document.getElementById('cat-list');
  if(!categories.length){el.innerHTML='<div style="color:var(--muted);font-size:13px">Kategoriya yo\'q</div>';return;}
  el.innerHTML=categories.map(c=>`
    <div class="cat-tag">
      <span>${c.emoji} ${c.name}</span>
      <button class="cat-del" onclick="deleteCategory('${c.id}')">×</button>
    </div>
  `).join('');
}

function renderCatSelect(){
  const sel=document.getElementById('f-cat');
  sel.innerHTML=categories.map(c=>`<option value="${c.id}">${c.emoji} ${c.name}</option>`).join('');
}

async function addCategory(){
  const emoji=document.getElementById('cat-emoji').value.trim()||'📦';
  const name=document.getElementById('cat-name').value.trim();
  if(!name){showToast('⚠️ Nom kiriting!');return;}
  const id=name.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
  const cat={id,emoji,name};
  try{await fetch(API+'/api/categories',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(cat)});}
  catch{categories.push(cat);localStorage.setItem('ss_cats',JSON.stringify(categories));}
  document.getElementById('cat-emoji').value='';
  document.getElementById('cat-name').value='';
  await loadCategories();
  showToast('✅ Kategoriya qo\'shildi!');
}

async function deleteCategory(id){
  if(!confirm('O\'chirishni tasdiqlaysizmi?'))return;
  try{await fetch(API+'/api/categories/'+id,{method:'DELETE'});}
  catch{categories=categories.filter(c=>c.id!==id);localStorage.setItem('ss_cats',JSON.stringify(categories));}
  await loadCategories();
  showToast('🗑 O\'chirildi!');
}

// COLORS
function renderColorItem(color,index){
  const isLight=isLightColor(color.hex);
  return `
    <div class="color-item" id="ci-${index}">
      <div class="color-hd">
        <div class="color-dot" style="background:${color.hex};border-color:${isLight?'#ccc':'white'}"></div>
        <input class="color-name-inp" value="${color.name}" placeholder="Rang nomi" onchange="updateColorName(${index},this.value)">
        <input type="color" class="color-picker" value="${color.hex}" onchange="updateColorHex(${index},this.value)">
        <button class="remove-color-btn" onclick="removeColor(${index})">×</button>
      </div>
      <div class="img-preview-wrap">
        <div class="img-preview" id="prev-${index}">
          ${color.imageUrl?`<img src="${color.imageUrl}" onerror="this.style.display='none'">`:'📷'}
        </div>
        <input class="url-inp" placeholder="Rasm URL ni kiriting..." value="${color.imageUrl||''}"
          oninput="updateColorImg(${index},this.value)" onpaste="setTimeout(()=>updateColorImg(${index},this.value),10)">
      </div>
    </div>
  `;
}

function isLightColor(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return (r*299+g*587+b*114)/1000>128;
}

function renderColors(){
  const el=document.getElementById('colors-list');
  el.innerHTML=formColors.map((c,i)=>renderColorItem(c,i)).join('');
  document.getElementById('add-color-btn').style.display=formColors.length>=4?'none':'block';
}

function addColor(){
  if(formColors.length>=4){showToast('⚠️ Max 4 ta rang!');return;}
  const preset=PRESET_COLORS[formColors.length]||{name:'Rang '+(formColors.length+1),hex:'#888888'};
  formColors.push({name:preset.name,hex:preset.hex,imageUrl:''});
  renderColors();
}

function removeColor(i){
  formColors.splice(i,1);
  renderColors();
}

function updateColorName(i,v){formColors[i].name=v;}
function updateColorHex(i,v){
  formColors[i].hex=v;
  const dot=document.querySelector(`#ci-${i} .color-dot`);
  if(dot){dot.style.background=v;dot.style.borderColor=isLightColor(v)?'#ccc':'white';}
}
function updateColorImg(i,v){
  formColors[i].imageUrl=v;
  const prev=document.getElementById(`prev-${i}`);
  if(prev){
    if(v){prev.innerHTML=`<img src="${v}" onerror="this.outerHTML='📷'">`;}
    else{prev.innerHTML='📷';}
  }
}

// FORM
function openForm(reset=true){
  if(reset){
    editingId=null;
    document.getElementById('form-title').textContent='Yangi mahsulot';
    document.getElementById('edit-id').value='';
    document.getElementById('f-name').value='';
    document.getElementById('f-desc').value='';
    document.getElementById('f-price').value='';
    document.getElementById('f-cat').value=categories[0]?.id||'';
    formColors=[];
    renderColors();
    // 1 ta rang avtomatik qo'shamiz
    addColor();
  }
  document.getElementById('prod-form').classList.add('open');
  document.getElementById('prod-form').scrollIntoView({behavior:'smooth'});
}

function closeForm(){
  document.getElementById('prod-form').classList.remove('open');
  editingId=null;
}

function editProduct(id){
  const p=products.find(x=>x.id===id);
  if(!p)return;
  editingId=id;
  document.getElementById('form-title').textContent='Mahsulotni tahrirlash';
  document.getElementById('f-name').value=p.name||'';
  document.getElementById('f-desc').value=p.description||'';
  document.getElementById('f-price').value=p.price||'';
  document.getElementById('f-cat').value=p.category||'';
  formColors=p.colors?JSON.parse(JSON.stringify(p.colors)):[{name:'Asosiy',hex:'#111111',imageUrl:p.image_url||''}];
  renderColors();
  openForm(false);
}

async function saveProduct(){
  const name=document.getElementById('f-name').value.trim();
  const price=document.getElementById('f-price').value;
  const description=document.getElementById('f-desc').value.trim();
  const category=document.getElementById('f-cat').value;
  if(!name||!price){showToast('⚠️ Nom va narxni kiriting!');return;}
  if(!formColors.length){showToast('⚠️ Kamida 1 ta rang qo\'shing!');return;}

  const prod={
    name,price:Number(price),description,category,
    colors:formColors,
    // Birinchi rangning rasmi asosiy rasm
    image_url:formColors[0]?.imageUrl||'',
    emoji:'👕'
  };

  try{
    if(editingId){
      await fetch(API+'/api/products/'+editingId,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(prod)});
    }else{
      await fetch(API+'/api/products',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(prod)});
    }
  }catch{
    if(editingId){
      const idx=products.findIndex(p=>p.id===editingId);
      if(idx>-1)products[idx]={...products[idx],...prod};
    }else{
      products.push({...prod,id:Date.now()});
    }
    localStorage.setItem('ss_products',JSON.stringify(products));
  }
  closeForm();
  await loadProducts();
  showToast(editingId?'✅ Tahrirlandi!':'✅ Qo\'shildi!');
}

// PRODUCTS LIST
function renderProducts(){
  const el=document.getElementById('prod-list');
  if(!products.length){
    el.innerHTML=`<div class="empty"><div class="icon">🎽</div><p>Hali mahsulot yo'q.<br>+ Qo'shish tugmasini bosing!</p></div>`;
    return;
  }
  const catMap={};categories.forEach(c=>catMap[c.id]=c.emoji+' '+c.name);
  el.innerHTML=products.map(p=>`
    <div class="prod-item">
      <div class="prod-thumb">
        ${p.image_url?`<img src="${p.image_url}" onerror="this.style.display='none'">`:'👕'}
        ${p.colors&&p.colors.length>1?`<div class="prod-colors-dots">${p.colors.map(c=>`<div class="pcdot" style="background:${c.hex}"></div>`).join('')}</div>`:''}
      </div>
      <div class="prod-info">
        <div class="prod-name">${p.name}</div>
        <div class="prod-meta">${catMap[p.category]||p.category} · ${p.colors?p.colors.length+' rang':'1 rang'}</div>
        <div class="prod-price">${Number(p.price).toLocaleString()} so'm</div>
      </div>
      <div class="prod-actions">
        <button class="edit-btn" onclick="editProduct(${p.id})">✏️</button>
        <button class="del-btn" onclick="deleteProduct(${p.id})">🗑</button>
      </div>
    </div>
  `).join('');
}

async function deleteProduct(id){
  if(!confirm('O\'chirishni tasdiqlaysizmi?'))return;
  try{await fetch(API+'/api/products/'+id,{method:'DELETE'});}
  catch{products=products.filter(p=>p.id!==id);localStorage.setItem('ss_products',JSON.stringify(products));}
  await loadProducts();
  showToast('🗑 O\'chirildi!');
}

// ORDERS
function renderOrders(){
  const el=document.getElementById('orders-list');
  if(!orders.length){
    el.innerHTML=`<div class="empty"><div class="icon">📦</div><p>Hali buyurtma yo'q</p></div>`;
    return;
  }
  el.innerHTML=[...orders].reverse().map(o=>`
    <div class="order-item">
      <div class="order-hd">
        <span class="order-id">#${o.id} · ${new Date(o.createdAt||Date.now()).toLocaleDateString('uz')}</span>
        <span class="order-status ${o.done?'status-done':'status-new'}">${o.done?'✅ Bajarildi':'🔔 Yangi'}</span>
      </div>
      <div class="order-name">${o.name}</div>
      <div class="order-info">📞 ${o.phone} · 📍 ${o.region||''} ${o.city||''}</div>
      <div class="order-info">📦 BTS: ${o.bts_point?.n||o.bts_point?.name||'-'}</div>
      <div class="order-info">💳 ${(o.pay||'').toUpperCase()}</div>
      <div class="order-items">${(o.cart||[]).map(i=>`${i.name} · ${i.size}${i.color?' · '+i.color:''} · ${i.qty}dona`).join('<br>')}</div>
      <div class="order-total">💵 Jami: ${Number(o.total||0).toLocaleString()} so'm</div>
      ${!o.done?`<button class="done-btn" onclick="markDone(${o.id})">✅ Bajarildi deb belgilash</button>`:''}
    </div>
  `).join('');
}

async function markDone(id){
  try{await fetch(API+'/api/orders/'+id+'/done',{method:'PUT'});}
  catch{const o=orders.find(x=>x.id===id);if(o)o.done=true;localStorage.setItem('ss_orders',JSON.stringify(orders));}
  await loadOrders();showToast('✅ Belgilandi!');
}

// TABS
function switchTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    const names=['products','categories','orders'];
    t.classList.toggle('active',names[i]===name);
  });
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),2500);
}
</script>
